name: Gmail Digest

on:
  schedule:
    # Run at 08:00 AM and 05:00 PM America/New_York
    # 08:00 AM ET = 13:00 UTC (daylight) or 14:00 UTC (standard)
    # 05:00 PM ET = 22:00 UTC (daylight) or 23:00 UTC (standard)
    # Using both to cover DST transitions
    - cron: '0 13,14 * * *'  # 08:00 AM ET
    - cron: '0 22,23 * * *'  # 05:00 PM ET
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Check current time (for debugging)
        run: |
          echo "UTC time: $(date -u)"
          echo "America/New_York time: $(TZ=America/New_York date)"

      - name: Restore state cache
        uses: actions/cache@v3
        with:
          path: state.json
          key: gmail-digest-state-${{ github.run_id }}
          restore-keys: |
            gmail-digest-state-

      - name: Run Gmail Digest
        env:
          MAIN_EMAIL: ${{ secrets.MAIN_EMAIL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GMAIL_ACCOUNTS_JSON: ${{ secrets.GMAIL_ACCOUNTS_JSON }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          LOOKBACK_HOURS: ${{ secrets.LOOKBACK_HOURS }}
        run: |
          python -m src.main

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v3
        with:
          path: state.json
          key: gmail-digest-state-${{ github.run_id }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7

