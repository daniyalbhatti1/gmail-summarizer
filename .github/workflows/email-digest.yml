name: Daily Email Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"

jobs:
  run-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild credential files
        run: |
          printf '%s' "${{ secrets.GMAIL_CREDENTIALS_JSON }}" > credentials.json
          printf '%s' "${{ secrets.GMAIL_TOKEN_JSON }}" > token.json

      - name: Run email digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
        run: python quickstart.py