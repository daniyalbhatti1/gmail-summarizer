# User-editable configuration for filtering and classification

# Senders to always mark as important (regex patterns)
whitelist_senders:
  - "boss@company\\.com"
  - "hr@company\\.com"
  - ".*@important-client\\.com"

# Senders to always ignore (regex patterns)
blacklist_senders:
  - "noreply@.*"
  - "no-reply@.*"
  - ".*newsletter.*@.*"
  - ".*marketing.*@.*"
  - "notifications@.*"
  - "donotreply@.*"

# Subject patterns to always mark as important
urgent_subject_patterns:
  - "\\bURGENT\\b"
  - "\\bDEADLINE\\b"
  - "action required"
  - "please review"
  - "signature required"
  - "payment due"
  - "payment failed"
  - "invoice due"
  - "past due"
  - "interview"
  - "job offer"
  - "confirm.*attendance"
  - "RSVP"
  - "verify your"
  - "MFA.*code"
  - "OTP"
  - "security alert"
  - "suspicious activity"

# Subject patterns to always ignore
ignore_subject_patterns:
  - "unsubscribe"
  - "\\d+% off"
  - "sale ends"
  - "limited time offer"
  - "flash sale"
  - "don't miss out"
  - "weekly digest"
  - "daily digest"
  - "newsletter"
  - "your.*has shipped"
  - "shipment tracking"
  - "order confirmation"

# Body keywords that boost importance
important_body_keywords:
  - "due date"
  - "deadline"
  - "by.*[0-9]{1,2}/[0-9]{1,2}"
  - "expires on"
  - "before.*[0-9]{1,2}:[0-9]{2}"
  - "needs your approval"
  - "waiting for your"
  - "please respond"
  - "reply by"
  - "confirm by"
  - "action needed"

# Gmail labels to ignore
ignore_labels:
  - "CATEGORY_PROMOTIONS"
  - "CATEGORY_SOCIAL"
  - "CATEGORY_FORUMS"
  - "SPAM"
  - "TRASH"

# Scoring weights (adjust to fine-tune classification)
scoring:
  direct_to_me: 3
  from_known_contact: 2
  reply_chain: 2
  important_label: 2
  urgent_subject: 5
  urgent_body: 3
  has_attachment: 1
  calendar_invite: 4
  whitelist_sender: 10
  blacklist_sender: -100
  promotional_category: -10
  has_unsubscribe_link: -2
  bulk_headers: -3

# Classification thresholds
thresholds:
  drop: 0  # Score below this gets dropped
  fyi: 2   # Score >= this is FYI
  actionable: 5  # Score >= this is actionable
  urgent: 8  # Score >= this is urgent

