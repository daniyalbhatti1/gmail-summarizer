version: '3.8'

services:
  gmail-digest:
    build: .
    container_name: gmail-digest
    restart: unless-stopped
    
    environment:
      # Required
      - MAIN_EMAIL=${MAIN_EMAIL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GMAIL_ACCOUNTS_JSON=${GMAIL_ACCOUNTS_JSON}
      
      # Optional
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - USE_LLM=${USE_LLM:-false}
      - TIMEZONE=${TIMEZONE:-America/New_York}
      - LOOKBACK_HOURS=${LOOKBACK_HOURS:-48}
      - TZ=${TIMEZONE:-America/New_York}
    
    volumes:
      # Mount logs directory to persist logs
      - ./logs:/app/logs
      
      # Optional: Mount config for easy editing
      - ./config.yml:/app/config.yml:ro
    
    # Healthcheck (runs digest once to verify config)
    healthcheck:
      test: ["CMD", "python", "-c", "from src.config import get_config; get_config()"]
      interval: 1h
      timeout: 10s
      retries: 3
      start_period: 30s

# Optional: Add a network if you want to isolate this service
# networks:
#   default:
#     name: gmail-digest-network

